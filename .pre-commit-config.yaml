repos:
  - repo: local
    hooks:
      - id: specl-validate
        name: specl translate and validate
        entry: bash -c '
          set -e
          for spec_dir in specs/*/; do
            name=$(basename "$spec_dir")
            [ -f "$spec_dir/spec.md" ] || continue
            specl-translate "$spec_dir/spec.md" "$spec_dir/spec.ttl" --strict
            specl-validate validate "$spec_dir/spec.ttl" src/specl/shapes.ttl --explain
          done
        '
        language: system
        files: '(specs/.*\.md|src/specl/shapes\.ttl|src/specl/spec_to_rdf\.py)$'
        pass_filenames: false
