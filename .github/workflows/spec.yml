name: spec
on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec:
          - specl_tool
          - specl_explorer
          - html_presenter
          - pptx_templater
          - excel_service
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install specl
        run: pip install -e .
      - name: Translate ${{ matrix.spec }}
        run: specl-translate specs/${{ matrix.spec }}/spec.md specs/${{ matrix.spec }}/spec.ttl --strict
      - name: Validate ${{ matrix.spec }}
        run: specl-validate validate specs/${{ matrix.spec }}/spec.ttl src/specl/shapes.ttl --explain --json specs/${{ matrix.spec }}/report.json
      - name: Score ${{ matrix.spec }}
        run: specl-validate score specs/${{ matrix.spec }}/spec.ttl src/specl/shapes.ttl
      - name: Badge ${{ matrix.spec }}
        run: |
          mkdir -p static/badges
          specl-validate badge specs/${{ matrix.spec }}/spec.ttl src/specl/shapes.ttl --out static/badges/${{ matrix.spec }}.svg
      - uses: actions/upload-artifact@v4
        with:
          name: spec-report-${{ matrix.spec }}
          path: |
            specs/${{ matrix.spec }}/spec.ttl
            specs/${{ matrix.spec }}/report.json
            static/badges/${{ matrix.spec }}.svg

  commit-badges:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all badges
        uses: actions/download-artifact@v4
        with:
          pattern: spec-report-*
          merge-multiple: true
      - name: Commit badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/badges/*.svg
          git diff --staged --quiet && echo "No badge changes" && exit 0
          git commit -m "ci: update maturity badges [skip ci]"
          git push
