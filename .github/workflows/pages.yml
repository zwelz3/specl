name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build pages site
        run: |
          mkdir -p _site
          cp src/specl/core.ttl _site/ns.ttl
          cp src/specl/shapes.ttl _site/shapes.ttl
          cp src/specl/explorer.html _site/explorer.html
          cp static/index.html _site/index.html
          if [ -d static/badges ]; then
            cp -r static/badges _site/badges
          fi
          echo "Site contents:"
          ls -la _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
